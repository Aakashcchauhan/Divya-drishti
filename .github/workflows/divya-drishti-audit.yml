name: Divya Drishti Audit Pipeline

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.jsx"
      - "**/*.tsx"
      - "**/*.md"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.jsx"
      - "**/*.tsx"
      - "**/*.md"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: divya-drishti-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: "true"
      GENERATE_PDF_IN_CI: "true"
      FAIL_ON_CRITICAL: "false"
      CREATE_AUDIT_PR: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Audit Engine
        run: node index.js "${{ github.workspace }}"

      - name: Ensure report exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f AUDIT_REPORT.md ]; then
            echo "AUDIT_REPORT.md was not generated by the audit run." >&2
            exit 1
          fi

      - name: Generate Summary Report
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          pwd
          ls -la
          {
            echo "# Audit Summary Report"
            echo
            echo "## Critical and High Issues"
            echo
          } > SUMMARY.md

          if grep -E "critical|high" -i AUDIT_REPORT.md | sort -fu >> SUMMARY.md; then
            true
          else
            echo "No critical or high issues found" >> SUMMARY.md
          fi

          {
            echo
            echo "## Notes"
            echo "- Duplicate issues removed"
            echo "- Focused on high-impact risks only"
          } >> SUMMARY.md

      - name: Publish Summary in Actions UI
        if: always()
        shell: bash
        run: |
          if [ -f SUMMARY.md ]; then
            cat SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Add AI Patch Suggestions
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const patchPath = "memory/patches.json";
            if (!fs.existsSync(patchPath)) {
              core.info("No patch suggestion file found at memory/patches.json");
              return;
            }

            const data = JSON.parse(fs.readFileSync(patchPath, "utf8"));
            const patches = Array.isArray(data?.patches) ? data.patches : [];

            if (!patches.length) {
              core.info("No patch suggestions available.");
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const commitId = context.payload.pull_request.head.sha;

            for (const patch of patches.slice(0, 20)) {
              const body = [
                `Suggested Fix for: ${patch.issue || "Issue"}`,
                "",
                "```diff",
                patch.diff || "",
                "```"
              ].join("\n");

              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  path: patch.file,
                  line: Number(patch.line),
                  side: "RIGHT",
                  body,
                  commit_id: commitId
                });
              } catch (error) {
                core.warning(`Failed to comment for ${patch.file}:${patch.line} - ${error.message}`);
              }
            }

      - name: Upload Full Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-audit-report
          if-no-files-found: warn
          path: AUDIT_REPORT.md

      - name: Upload Summary Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-report
          if-no-files-found: warn
          path: SUMMARY.md

      - name: Upload Patch Suggestions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-suggestions
          if-no-files-found: warn
          path: memory/patches.json

      - name: Upload PDF Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-pdf
          if-no-files-found: warn
          path: |
            AUDIT_REPORT.pdf
            memory/audit_report.pdf

      - name: Fail on Critical Issues
        if: env.FAIL_ON_CRITICAL == 'true'
        shell: bash
        run: |
          if grep -iq "critical" AUDIT_REPORT.md; then
            echo "Critical issues found. Failing CI."
            exit 1
          fi

      - name: Comment Summary on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: SUMMARY.md

      - name: Create Pull Request with Reports
        if: github.event_name == 'push' && env.CREATE_AUDIT_PR == 'true' && github.actor != 'github-actions[bot]'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(audit): automated Divya Drishti report"
          committer: divya-drishti-bot <bot@divya.ai>
          author: divya-drishti-bot <bot@divya.ai>
          title: "Automated Code Audit Report"
          body: |
            This PR contains an automated audit report generated by Divya Drishti.

            Summary:
            - Focused on critical and high-risk issues
            - Duplicate findings removed
            - Covers security, logic, performance, and UI

            Please review before merging.
          branch: audit/${{ github.run_id }}
          base: ${{ github.ref_name }}
          add-paths: |
            AUDIT_REPORT.md
            SUMMARY.md
            AUDIT_REPORT.pdf
            memory/audit_report.pdf
