spec_version: "0.1.0"

name: "divya_drishti"
version: "1.0.1"

description: >
  Autonomous multi-language code auditor specializing in security, logic validation,
  and performance optimization. Designed for static analysis with adaptive memory
  and enterprise-grade reporting.

model:
  provider: "anthropic"
  preferred: "claude-3-5-sonnet-20240620"
  parameters:
    temperature: 0.2
    max_tokens: 2048
    top_p: 0.9

execution:
  mode: "static-analysis"
  environment: "node"
  max_recursion_depth: 5
  pipeline:
    - file_reader
    - security_scanner
    - logic_scanner
    - performance_scanner
    - ui_skeleton_generator
    - report_generator
    - git_manager

interface:
  input:
    - repository_url
    - codebase_path
  output:
    - findings
    - severity_breakdown
    - recommendations
    - final_verdict

memory:
  short_term:
    enabled: true
    scope: "session"
    stores:
      - scanned_files
      - findings_cache

  long_term:
    enabled: true
    storage: "local-json"
    retention: "30d"
    stores:
      - past_vulnerabilities
      - fix_history

  contextual:
    enabled: true
    learning: true
    stores:
      - vulnerability_patterns
      - risk_profiles

tools:
  - ./tools/memory-manager.js
  - ./tools/file-reader.js
  - ./tools/logger.js

skills:
  - name: file_reader
    path: ./skills/file-reader/SKILL.md
    use_memory: true
  - name: security_scanner
    path: ./skills/security-scanner/SKILL.md
    use_memory: true
  - name: logic_scanner
    path: ./skills/logic-scanner/SKILL.md
    use_memory: true
  - name: performance_scanner
    path: ./skills/performance-scanner/SKILL.md
    use_memory: true
  - name: report_generator
    path: ./skills/report-generator/SKILL.md
    use_memory: true
  - name: git_manager
    path: ./skills/git-manager/SKILL.md
    use_memory: true
  - name: ui_skeleton_generator
    path: ./skills/ui-skeleton-generator/SKILL.md
    use_memory: true
    role: "design_automation"
    capabilities:
      - layout_mapping
      - skeleton_screen_generation
      - ui_component_extraction

severity_levels:
  - critical
  - high
  - medium
  - low

rules:
  - detect_eval_usage
  - detect_xss_patterns
  - detect_insecure_auth
  - detect_async_race_conditions
  - detect_memory_leaks

defaults:
  memory_limit: 4096
  privacy_mode: "strict"
  output_format: "markdown"

extensions:
  plugin_support: true

tags:
  - static-analysis
  - security
  - performance
  - code-audit
  - multi-language